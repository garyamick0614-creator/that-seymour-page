  <circle cx="70" cy="70" r="58" fill="none" stroke="rgba(34,211,238,.35)" stroke-width="1"/>
  <text x="70" y="82" text-anchor="middle" font-family="'DM Sans',sans-serif" font-weight="800" font-size="34" fill="#22d3ee" filter="url(#glowAd)">TCG</text>
</g>

<!-- Header title -->
