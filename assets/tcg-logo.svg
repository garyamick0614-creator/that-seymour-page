<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" preserveAspectRatio="xMidYMid slice" role="img" aria-label="TCG Solutions: Your Technology Partner — Web Solutions, That Computer Guy, Cloud Services">
<defs>
<linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#050814"/>
  <stop offset="50%" stop-color="#0a1628"/>
  <stop offset="100%" stop-color="#0f1b2d"/>
</linearGradient>
<linearGradient id="cyanBtn" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#22d3ee"/>
  <stop offset="100%" stop-color="#0891b2"/>
</linearGradient>
<linearGradient id="goldBtn" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#fbbf24"/>
  <stop offset="100%" stop-color="#d97706"/>
</linearGradient>
<linearGradient id="purpBtn" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#a855f7"/>
  <stop offset="100%" stop-color="#6d28d9"/>
</linearGradient>
<linearGradient id="cardGlass" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
  <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
</linearGradient>
<linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#fff"/>
  <stop offset="100%" stop-color="#67e8f9"/>
</linearGradient>
<pattern id="circuit" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
  <path d="M 10 20 L 40 20 L 40 60 L 80 60 L 80 100 L 110 100 M 60 0 L 60 35 M 0 85 L 25 85 L 25 110" fill="none" stroke="#22d3ee" stroke-width="0.6" opacity=".25"/>
  <circle cx="10" cy="20" r="1.5" fill="#22d3ee" opacity=".4"/>
  <circle cx="80" cy="60" r="1.5" fill="#22d3ee" opacity=".4"/>
  <circle cx="25" cy="85" r="1.5" fill="#22d3ee" opacity=".4"/>
</pattern>
<filter id="glowAd" x="-20%" y="-20%" width="140%" height="140%">
  <feGaussianBlur stdDeviation="3"/>
</filter>
<filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
  <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0891b2" flood-opacity=".35"/>
</filter>
</defs>

<rect width="1400" height="700" fill="url(#bgA)"/>
<rect width="1400" height="700" fill="url(#circuit)"/>

<!-- Top accent gradient bar -->
<rect x="0" y="0" width="1400" height="3" fill="url(#cyanBtn)" opacity=".8"/>
<rect x="0" y="697" width="1400" height="3" fill="url(#cyanBtn)" opacity=".8"/>

<!-- Nebula glow accents -->
<ellipse cx="250" cy="150" rx="300" ry="150" fill="#22d3ee" opacity=".08"/>
<ellipse cx="1150" cy="550" rx="300" ry="150" fill="#a855f7" opacity=".08"/>

<!-- TCG LOGO BADGE (left) -->
<g transform="translate(50,50)">
